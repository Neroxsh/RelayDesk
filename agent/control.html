<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RelayDesk · 此电脑</title>
  <style>
    :root{color-scheme:dark;--bg:#090a0d;--panel:#111318;--panel2:#171a20;--text:#f2f4f7;--muted:#89919c;--faint:#555d67;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);--lime:#a9ff68;--lime-soft:rgba(169,255,104,.1);--red:#ff8b81}
    *{box-sizing:border-box}html,body{min-height:100%}body{margin:0;background:radial-gradient(circle at 50% -20%,rgba(169,255,104,.08),transparent 36%),var(--bg);color:var(--text);font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased}button,a{font:inherit}button{color:inherit}
    main{width:min(1040px,calc(100% - 36px));margin:0 auto;padding:30px 0 68px}.top{min-height:54px;display:flex;align-items:center;gap:13px;margin-bottom:42px}.mark{width:40px;height:40px;display:grid;place-items:center;border-radius:12px;background:#f2f4f7;color:#090b0e;font-size:15px;font-weight:900;letter-spacing:-.06em}.brand{min-width:0;flex:1}.brand h1,.brand p{margin:0}.brand h1{font-size:14px;letter-spacing:-.025em}.brand p{margin-top:3px;color:var(--faint);font-size:9px}.top-status{display:flex;align-items:center;gap:7px;padding:7px 10px;border:1px solid var(--line);border-radius:99px;background:rgba(255,255,255,.02);color:#aab1ba;font-size:9px}.top-status i{width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 11px rgba(169,255,104,.45)}
    .hero{position:relative;overflow:hidden;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:36px;align-items:end;padding:32px;border:1px solid var(--line2);border-radius:24px;background:rgba(17,19,24,.92);box-shadow:0 24px 80px rgba(0,0,0,.28)}.hero:after{content:"";position:absolute;right:-80px;top:-120px;width:300px;height:300px;border:1px solid rgba(169,255,104,.08);border-radius:50%;box-shadow:0 0 0 42px rgba(169,255,104,.025),0 0 0 84px rgba(169,255,104,.018);pointer-events:none}.hero-copy,.key-panel{position:relative;z-index:1}.eyebrow{display:block;margin-bottom:13px;color:var(--lime);font:700 9px/1 Consolas,monospace;letter-spacing:.14em;text-transform:uppercase}.hero h2{margin:0;font-size:clamp(30px,5vw,50px);line-height:1;letter-spacing:-.055em}.hero p{max-width:470px;margin:14px 0 0;color:var(--muted);font-size:12px;line-height:1.7}.remote-link{display:inline-flex;align-items:center;gap:8px;margin-top:22px;color:#c7cdd4;font-size:10px;text-decoration:none}.remote-link span{color:var(--lime)}
    .key-panel{width:390px;padding:13px;border:1px solid var(--line);border-radius:18px;background:#0a0c10}.key-label{display:flex;align-items:center;justify-content:space-between;padding:2px 3px 10px;color:var(--faint);font-size:8px}.key-label span:last-child{font-family:Consolas,monospace}.key{display:flex;align-items:center;gap:9px;padding:10px 10px 10px 14px;border:1px solid var(--line2);border-radius:13px;background:#15181e}.key>span{min-width:0;flex:1;overflow:hidden;color:#fff;font:720 18px/1.2 Consolas,monospace;letter-spacing:.1em;white-space:nowrap;text-overflow:ellipsis}.key button,.action{border:0;cursor:pointer;font-weight:700}.key button{height:34px;padding:0 12px;border-radius:9px;background:var(--lime);color:#091008;font-size:9px}.device-line{display:flex;align-items:center;gap:8px;margin:10px 4px 1px;color:#78818c;font-size:9px}.device-line i{width:5px;height:5px;border-radius:50%;background:var(--lime)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px}.card{min-height:280px;padding:22px;border:1px solid var(--line);border-radius:20px;background:var(--panel)}.card-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px}.card-title{min-width:0;flex:1}.card h3,.card p{margin:0}.card h3{font-size:13px;letter-spacing:-.02em}.card p{margin-top:5px;color:var(--muted);font-size:10px;line-height:1.55}.count{min-width:24px;height:24px;display:grid;place-items:center;border:1px solid var(--line);border-radius:8px;background:#0b0d11;color:#7c8590;font:650 8px/1 Consolas,monospace}.list{display:grid;gap:8px}.empty{min-height:120px;display:grid;place-items:center;border:1px dashed var(--line2);border-radius:14px;color:var(--faint);font-size:10px}.row{display:flex;align-items:center;gap:11px;padding:11px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.014)}.phone{width:34px;height:34px;flex:0 0 34px;display:grid;place-items:center;border-radius:10px;background:#1b1f26;color:#939ba6;font-size:9px;font-weight:800}.copy{min-width:0;flex:1}.copy strong,.copy span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.copy strong{font-size:10px}.copy span{margin-top:4px;color:#5f6772;font-size:8px}.actions{display:flex;gap:6px}.action{height:31px;padding:0 10px;border-radius:9px;background:#20242b;color:#9ea6b0;font-size:8px}.action:hover{filter:brightness(1.12)}.action.primary{background:var(--lime);color:#0a1008}.action.danger{background:rgba(255,139,129,.1);color:#ff9b92}.notice{position:fixed;z-index:20;left:50%;bottom:24px;display:none;transform:translateX(-50%);padding:10px 14px;border:1px solid var(--line2);border-radius:11px;background:#1a1e25;color:#eef1f4;box-shadow:0 16px 50px rgba(0,0,0,.4);font-size:9px}.notice.show{display:block}footer{display:flex;align-items:center;justify-content:space-between;margin-top:18px;padding:0 3px;color:#4f5761;font-size:8px}footer span:last-child{font-family:Consolas,monospace}
    @media(max-width:780px){main{width:min(100% - 24px,600px);padding-top:18px}.top{margin-bottom:24px}.hero{grid-template-columns:1fr;padding:24px}.key-panel{width:100%}.grid{grid-template-columns:1fr}.card{min-height:0}.row{align-items:flex-start;flex-wrap:wrap}.actions{width:100%}.action{flex:1}.key>span{font-size:14px}.hero h2{font-size:38px}footer{display:none}}
  </style>
</head>
<body data-token="__CONTROL_TOKEN__">
  <main>
    <header class="top"><div class="mark">R</div><div class="brand"><h1>RelayDesk</h1><p>此电脑</p></div><div class="top-status"><i></i><span>服务在线</span></div></header>
    <div id="notice" class="notice"></div>
    <section class="hero">
      <div class="hero-copy"><span class="eyebrow">Pair a device</span><h2>连接新设备</h2><p>在手机打开 RelayDesk，输入右侧连接码。</p><a class="remote-link" href="https://relay.xingshihao.site" target="_blank" rel="noreferrer">打开手机版 <span>↗</span></a></div>
      <div class="key-panel"><div class="key-label"><span>连接码</span><span>16 DIGITS</span></div><div class="key"><span id="pair-key">读取中…</span><button id="copy-key">复制</button></div><div class="device-line"><i></i><span id="device-status">正在读取电脑状态</span></div></div>
    </section>
    <div class="grid">
      <section class="card"><div class="card-head"><div class="card-title"><h3>待确认</h3><p>只处理你刚刚发起的请求。</p></div><span id="pending-count" class="count">0</span></div><div id="pending" class="list"><div class="empty">暂无请求</div></div></section>
      <section class="card"><div class="card-head"><div class="card-title"><h3>已连接</h3><p>这些设备可以直接打开 RelayDesk。</p></div><span id="client-count" class="count">0</span></div><div id="clients" class="list"><div class="empty">暂无设备</div></div></section>
    </div>
    <footer><span>RelayDesk 在此电脑上运行</span><span>127.0.0.1:43127</span></footer>
  </main>
  <script>
    const token=document.body.dataset.token;
    const notice=document.getElementById('notice');
    function escapeHtml(value){return String(value).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
    function show(message){notice.textContent=message;notice.classList.add('show');setTimeout(function(){notice.classList.remove('show')},2400)}
    async function api(path,body){const response=await fetch(path,{method:body?'POST':'GET',headers:{'content-type':'application/json','x-relaydesk-control':token},body:body?JSON.stringify(body):undefined});const data=await response.json();if(!response.ok)throw new Error(data.error||'操作失败');return data}
    async function refresh(){try{const state=await api('/api/state');document.getElementById('pair-key').textContent=state.pairKey;document.getElementById('device-status').textContent=state.deviceName+' · 已连接';renderPending(state.pending||[]);renderClients(state.clients||[])}catch(error){show(error.message)}}
    function renderPending(items){document.getElementById('pending-count').textContent=items.length;const root=document.getElementById('pending');if(!items.length){root.innerHTML='<div class="empty">暂无请求</div>';return}root.innerHTML=items.map(function(item){return '<div class="row"><div class="phone">NEW</div><div class="copy"><strong>'+escapeHtml(item.phoneName)+'</strong><span>刚刚 · 10 分钟内有效</span></div><div class="actions"><button class="action" data-reject="'+item.requestId+'">拒绝</button><button class="action primary" data-approve="'+item.requestId+'">连接</button></div></div>'}).join('')}
    function renderClients(items){document.getElementById('client-count').textContent=items.length;const root=document.getElementById('clients');if(!items.length){root.innerHTML='<div class="empty">暂无设备</div>';return}root.innerHTML=items.map(function(item){return '<div class="row"><div class="phone">OK</div><div class="copy"><strong>'+escapeHtml(item.name||'手机')+'</strong><span>已连接 · '+escapeHtml(item.clientId.slice(-8))+'</span></div><div class="actions"><button class="action danger" data-revoke="'+item.clientId+'">移除</button></div></div>'}).join('')}
    document.addEventListener('click',async function(event){const button=event.target.closest('button');if(!button)return;try{if(button.id==='copy-key'){await navigator.clipboard.writeText(document.getElementById('pair-key').textContent);show('已复制');return}if(button.dataset.approve){await api('/api/approve',{requestId:button.dataset.approve});show('设备已连接')}if(button.dataset.reject){await api('/api/reject',{requestId:button.dataset.reject});show('已拒绝')}if(button.dataset.revoke){if(!confirm('移除这台设备？'))return;await api('/api/revoke',{clientId:button.dataset.revoke});show('设备已移除')}await refresh()}catch(error){show(error.message)}})
    refresh();setInterval(refresh,2000);
  </script>
</body>
</html>
