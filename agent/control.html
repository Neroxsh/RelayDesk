<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RelayDesk · 电脑控制中心</title>
  <style>
    :root{color-scheme:light;--page:#f4f4f1;--surface:#fff;--surface2:#f0f0ed;--ink:#171715;--muted:#6d6d68;--faint:#989892;--line:#ddddda;--line2:#c9c9c4;--accent:#315bea;--success:#2f7a46;--success2:#e8f4eb;--danger:#a14534;--danger2:#f8ece7;--shadow:0 16px 50px rgba(25,25,20,.08)}
    @media(prefers-color-scheme:dark){:root{color-scheme:dark;--page:#0f0f0f;--surface:#171717;--surface2:#202020;--ink:#f2f2ef;--muted:#aaa9a3;--faint:#74736e;--line:#2d2d2b;--line2:#41413e;--accent:#8ca5ff;--success:#72b985;--success2:#1a3021;--danger:#e39a7f;--danger2:#3a2520;--shadow:0 20px 70px rgba(0,0,0,.28)}}
    *{box-sizing:border-box}body{margin:0;background:var(--page);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased}.shell{width:min(1040px,calc(100% - 40px));margin:0 auto;padding:28px 0 36px}.topbar{height:54px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:baseline;gap:10px}.brand strong{font-size:18px;letter-spacing:-.04em}.brand span{color:var(--muted);font-size:12px}.online{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:99px;background:var(--success2);color:var(--success);font-size:11px;font-weight:650}.online i{width:7px;height:7px;border-radius:50%;background:currentColor}.intro{margin-top:30px;display:grid;grid-template-columns:minmax(0,1.2fr) minmax(310px,.8fr);gap:18px}.intro-copy,.code-card,.panel{border:1px solid var(--line);border-radius:18px;background:var(--surface)}.intro-copy{padding:38px}.eyebrow{margin:0 0 13px;color:var(--muted);font-size:12px;font-weight:650}.intro h1{margin:0;font-size:38px;line-height:1.1;letter-spacing:-.055em}.intro-copy>p:last-of-type{max-width:500px;margin:15px 0 0;color:var(--muted);font-size:14px;line-height:1.7}.phone-link{display:inline-flex;margin-top:24px;color:var(--accent);font-size:12px;font-weight:650;text-underline-offset:3px}.code-card{display:flex;flex-direction:column;justify-content:center;padding:26px}.code-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;color:var(--muted);font-size:11px}.code{padding:16px;border:1px solid var(--line2);border-radius:13px;background:var(--surface2);font:750 20px/1.2 ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:.08em;text-align:center;white-space:nowrap}.code-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.button{height:38px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--ink);font-size:11px;font-weight:650;cursor:pointer;text-decoration:none}.button.primary{border-color:var(--ink);background:var(--ink);color:var(--surface)}.button.danger{color:var(--danger)}.device-line{display:flex;align-items:center;gap:7px;margin:13px 2px 0;color:var(--muted);font-size:10px}.device-line i{width:6px;height:6px;border-radius:50%;background:var(--success)}.grid{margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:18px}.panel{min-height:280px;padding:22px}.panel-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}.panel h2{margin:0;font-size:15px;letter-spacing:-.025em}.panel-head p{margin:5px 0 0;color:var(--muted);font-size:11px}.count{min-width:27px;height:24px;display:grid;place-items:center;border-radius:99px;background:var(--surface2);color:var(--muted);font-size:10px}.list{display:grid;gap:9px}.row{min-height:64px;display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:14px;padding:10px 10px 10px 12px;border:1px solid var(--line);border-radius:12px}.copy{min-width:0}.copy strong,.copy span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.copy strong{font-size:12px}.copy span{margin-top:4px;color:var(--muted);font-size:10px}.actions{display:flex;gap:6px}.actions .button{height:34px;padding:0 10px}.empty{height:160px;display:grid;place-content:center;color:var(--faint);font-size:11px;text-align:center}.footer{display:flex;justify-content:space-between;margin-top:18px;padding:0 3px;color:var(--faint);font-size:10px}.notice{position:fixed;left:50%;bottom:26px;transform:translate(-50%,20px);padding:10px 14px;border-radius:99px;background:var(--ink);color:var(--surface);box-shadow:var(--shadow);font-size:11px;opacity:0;pointer-events:none;transition:.18s}.notice.show{transform:translate(-50%,0);opacity:1}
    .provider-panel{min-height:0;margin-top:18px}.provider-grid{display:grid;grid-template-columns:1fr;gap:12px}.provider-card{padding:14px;border:1px solid var(--line);border-radius:13px;background:var(--surface2)}.provider-card label{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;font-size:12px;font-weight:700}.provider-card label span{color:var(--muted);font-size:10px;font-weight:500}.path-input{width:100%;height:40px;padding:0 11px;border:1px solid var(--line2);border-radius:9px;background:var(--surface);color:var(--ink);font:11px/1.3 ui-monospace,SFMono-Regular,Consolas,monospace;outline:none}.path-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 14%,transparent)}.path-status{min-height:16px;margin:8px 1px 0;color:var(--muted);font-size:10px;line-height:1.5}.settings-actions{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:12px}.settings-actions p{margin:0;color:var(--faint);font-size:10px;line-height:1.5}.settings-actions .button{min-width:112px;padding:0 16px}
    @media(max-width:760px){.shell{width:min(100% - 24px,560px);padding-top:14px}.topbar{height:48px}.intro,.grid,.provider-grid{grid-template-columns:1fr}.intro{margin-top:18px}.intro-copy{padding:28px 24px}.intro h1{font-size:34px}.code-card{padding:20px}.panel{min-height:220px}.provider-panel{min-height:0}.footer{display:block;line-height:1.8}.settings-actions{align-items:flex-start;flex-direction:column}.settings-actions .button{width:100%}}
  </style>
</head>
<body data-token="__CONTROL_TOKEN__">
  <main class="shell">
    <header class="topbar"><div class="brand"><strong>RelayDesk</strong><span>电脑控制中心</span></div><span class="online"><i></i>服务在线</span></header>
    <section class="intro">
      <div class="intro-copy"><p class="eyebrow">手机连接</p><h1>连接这台电脑</h1><p>手机输入右侧配对码，再在下方确认连接。</p><a class="phone-link" href="https://relay.xingshihao.site" target="_blank" rel="noreferrer">打开手机端</a></div>
      <div class="code-card"><div class="code-label"><span>配对码</span><span>16 位</span></div><div class="code" id="pair-key">读取中…</div><div class="code-actions"><button class="button primary" id="copy-key">复制配对码</button><button class="button" id="refresh">刷新</button></div><div class="device-line"><i></i><span id="device-status">正在读取电脑状态</span></div></div>
    </section>
    <section class="grid">
      <div class="panel"><div class="panel-head"><div><h2>连接请求</h2><p>确认正在连接的设备</p></div><span class="count" id="pending-count">0</span></div><div class="list" id="pending"><div class="empty">暂无连接请求</div></div></div>
      <div class="panel"><div class="panel-head"><div><h2>已连接设备</h2><p>管理手机和浏览器</p></div><span class="count" id="client-count">0</span></div><div class="list" id="clients"><div class="empty">还没有连接手机</div></div></div>
    </section>
    <section class="panel provider-panel">
      <div class="panel-head"><div><h2>Codex 会话目录</h2><p>通常不需要修改。仅在会话没有出现时指定位置。</p></div></div>
      <div class="provider-grid">
        <div class="provider-card"><label for="codex-home">Codex <span id="codex-count">检查中</span></label><input class="path-input" id="codex-home" autocomplete="off" spellcheck="false" placeholder="例如 C:\Users\你的名字\.codex"><p class="path-status" id="codex-status">正在检查会话目录</p></div>
      </div>
      <div class="settings-actions"><p>可以填写 .codex 或 sessions 目录。留空会恢复自动查找。</p><button class="button primary" id="save-paths">保存目录</button></div>
    </section>
    <footer class="footer"><span>RelayDesk 正在本机后台运行</span><span>127.0.0.1:43127</span></footer>
  </main>
  <div class="notice" id="notice"></div>
  <script>
    const token=document.body.dataset.token;
    const notice=document.getElementById('notice');
    function escapeHtml(value){return String(value).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
    function show(message){notice.textContent=message;notice.classList.add('show');setTimeout(function(){notice.classList.remove('show')},2200)}
    async function api(path,body){const response=await fetch(path,{method:body?'POST':'GET',headers:{'content-type':'application/json','x-relaydesk-control':token},body:body?JSON.stringify(body):undefined});const data=await response.json();if(!response.ok)throw new Error(data.error||'操作失败');return data}
    function renderProvider(name,data){data=data||{};const input=document.getElementById(name+'-home');if(document.activeElement!==input&&!input.dataset.dirty)input.value=data.configuredHome||data.activeHome||'';document.getElementById(name+'-count').textContent=(data.count||0)+' 个会话';const status=document.getElementById(name+'-status');if(data.count){status.textContent='正在读取 '+data.activeRoot+(data.skippedCount?(' · '+data.skippedCount+' 个文件未识别'):'');status.style.color='var(--success)'}else if(data.fileCount){status.textContent='找到了 '+data.fileCount+' 个文件，但没有识别出会话';status.style.color='var(--danger)'}else{status.textContent='没有找到会话 · 已检查 '+((data.searched||[]).length)+' 个位置';status.style.color='var(--danger)'}}
    async function refresh(){try{const state=await api('/api/state');document.getElementById('pair-key').textContent=state.pairKey;document.getElementById('device-status').textContent=state.deviceName+' · 已连接中继';renderPending(state.pending||[]);renderClients(state.clients||[]);renderProvider('codex',state.providers&&state.providers.codex)}catch(error){show(error.message)}}
    function renderPending(items){document.getElementById('pending-count').textContent=items.length;const root=document.getElementById('pending');if(!items.length){root.innerHTML='<div class="empty">暂无连接请求</div>';return}root.innerHTML=items.map(function(item){return '<div class="row"><div class="copy"><strong>'+escapeHtml(item.phoneName)+'</strong><span>等待确认 · 10 分钟后失效</span></div><div class="actions"><button class="button danger" data-reject="'+item.requestId+'">拒绝</button><button class="button primary" data-approve="'+item.requestId+'">允许连接</button></div></div>'}).join('')}
    function renderClients(items){document.getElementById('client-count').textContent=items.length;const root=document.getElementById('clients');if(!items.length){root.innerHTML='<div class="empty">还没有连接手机</div>';return}root.innerHTML=items.map(function(item){const activity=item.activity||{};const detail=activity.lastAcknowledgedAt?('手机已收到 '+(activity.acknowledgedSessions||0)+' 个会话'):activity.lastRequestAt?'正在同步会话':'已连接，等待手机打开';return '<div class="row"><div class="copy"><strong>'+escapeHtml(item.name||'手机')+'</strong><span>'+escapeHtml(detail)+'</span></div><div class="actions"><button class="button danger" data-revoke="'+item.clientId+'">移除</button></div></div>'}).join('')}
    document.querySelectorAll('.path-input').forEach(function(input){input.addEventListener('input',function(){input.dataset.dirty='1'})});
    document.addEventListener('click',async function(event){const button=event.target.closest('button');if(!button)return;try{if(button.id==='copy-key'){await navigator.clipboard.writeText(document.getElementById('pair-key').textContent);show('配对码已复制');return}if(button.id==='refresh'){await refresh();show('已刷新');return}if(button.id==='save-paths'){button.disabled=true;await api('/api/settings',{codexHome:document.getElementById('codex-home').value});document.querySelectorAll('.path-input').forEach(function(input){delete input.dataset.dirty});await refresh();show('会话目录已更新');button.disabled=false;return}if(button.dataset.approve){await api('/api/approve',{requestId:button.dataset.approve});show('手机已连接')}if(button.dataset.reject){await api('/api/reject',{requestId:button.dataset.reject});show('已拒绝')}if(button.dataset.revoke){if(!confirm('移除这台设备？'))return;await api('/api/revoke',{clientId:button.dataset.revoke});show('设备已移除')}await refresh()}catch(error){button.disabled=false;show(error.message)}})
    refresh();setInterval(refresh,2000);
  </script>
</body>
</html>
